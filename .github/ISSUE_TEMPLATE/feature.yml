name: Enhance / 功能建议
title: "[ENHANCE] 请填写简短易读的标题"
description: "请求新增功能、优化体验或补完已有能力"
labels:
  - "enhancement"
body:
  - type: markdown
    attributes:
      value: |
        ## 作者的话

        提交 Issue 或 Discussion 前，请保持礼貌、尊重和友善。作者不是任何人的专属开发人员，也只是一个平时有很多事情要忙的学生。清楚描述问题、耐心沟通，以及一句简单的“感谢开发和维护”并不难，也会让开源协作更舒服。

  - type: checkboxes
    id: author-note
    attributes:
      label: 作者的话
      description: 请确认你理解并愿意保持礼貌、尊重和友善
      options:
        - label: 我知道了，会保持礼貌、尊重和友善，理解作者不是我的专属开发人员，也感谢作者开发和维护项目
          required: true

  - type: markdown
    attributes:
      value: |
        请把一个建议拆成一个 `Enhance`，不要把多个完全不同的需求塞进同一个 Issue。
        如果你只是想分享使用妙招、配置经验或一般性提问，请改用 `Discussions`。
        请知悉本项目不会开发的内容：

  - type: checkboxes
    id: terms
    attributes:
      label: 非重复的Issue
      description: 先去Issues列表中查找下是否存在相似的功能推荐，如果有了请在issue下继续添加讨论
      options:
        - label: 已确认没有相似的Issue
          required: true

  - type: textarea
    id: description
    validations:
      required: true
    attributes:
      label: 需求描述
      description: 请说明你想解决什么问题、目前哪里不方便、理想结果是什么

  - type: checkboxes
    id: platform
    attributes:
      label: 平台
      description: 这个功能针对什么平台
      options:
        - label: Android
        - label: Android TV
        - label: IOS
        - label: MacOS
        - label: Windows
        - label: Linux

  - type: dropdown
    id: request-type
    attributes:
      label: 建议类型
      description: 请选择更接近你这次反馈的类型
      options:
        - 体验优化
        - 新增功能
        - 平台适配
        - 文案 / 图标 / UI 调整
        - 发布 / 构建 / 文档
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 附加信息
      description: 可以附加相关截图、视频、链接或参考产品
